name: Build and Deploy PDFs

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX documents
        uses: xu-cheng/latex-action@v3
        with:
          work_in_root_file_dir: true
          root_file: |
            problem-sets/*.tex
            readings/*.tex
            handouts/*.tex
          latexmk_shell_escape: true
          latexmk_use_lualatex: false
          latexmk_use_xelatex: false

      - name: Collect PDFs into site directory
        run: |
          mkdir -p _site/problem-sets _site/readings _site/handouts
          find problem-sets -name "*.pdf" -exec cp {} _site/problem-sets/ \;
          find readings   -name "*.pdf" -exec cp {} _site/readings/   \;
          find handouts   -name "*.pdf" -exec cp {} _site/handouts/   \;

      - name: Generate index page
        run: |
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Math 5520H</title>
            <style>
              body { font-family: Georgia, serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; color: #222; }
              h1 { border-bottom: 2px solid #222; padding-bottom: .4rem; }
              h2 { margin-top: 2rem; }
              ul { list-style: none; padding: 0; }
              li { margin: .4rem 0; }
              a { color: #1a5276; text-decoration: none; }
              a:hover { text-decoration: underline; }
              a::before { content: "📘 "; }
            </style>
          </head>
          <body>
            <h1>Math 5520H</h1>
            <p>Combined linear algebra and differential equations — Ohio State University</p>
          EOF

          for dir in problem-sets readings handouts; do
            pdfs=$(ls _site/$dir/*.pdf 2>/dev/null | sort)
            if [ -n "$pdfs" ]; then
              label=$(echo $dir | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1))substr($i,2); print}')
              echo "    <h2>$label</h2><ul>" >> _site/index.html
              for pdf in $pdfs; do
                name=$(basename "$pdf" .pdf)
                echo "    <li><a href=\"$dir/$(basename $pdf)\">$name</a></li>" >> _site/index.html
              done
              echo "    </ul>" >> _site/index.html
            fi
          done

          echo "</body></html>" >> _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
